<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏥 Hospital EHMS - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
        }

        .login-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 50px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 420px;
            padding: 50px;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-section {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-icon {
            font-size: 60px;
            margin-bottom: 15px;
        }

        .hospital-name {
            font-size: 28px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 5px;
        }

        .tagline {
            font-size: 14px;
            color: #999;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .remember-forgot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            font-size: 13px;
        }

        .remember-forgot input[type="checkbox"] {
            width: auto;
            margin-right: 5px;
        }

        .forgot-password {
            color: #667eea;
            text-decoration: none;
        }

        .forgot-password:hover {
            text-decoration: underline;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .signup-section {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #666;
        }

        .signup-section a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .signup-section a:hover {
            text-decoration: underline;
        }

        .demo-credentials {
            background: #f5f5f5;
            border-left: 4px solid #667eea;
            padding: 12px 15px;
            margin-top: 25px;
            border-radius: 5px;
            font-size: 12px;
            color: #666;
        }

        .demo-credentials strong {
            display: block;
            margin-bottom: 8px;
            color: #333;
        }

        .demo-credentials p {
            margin: 4px 0;
        }

        .error-message {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
        }

        .success-message {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 30px 20px;
            }

            .hospital-name {
                font-size: 24px;
            }

            .logo-icon {
                font-size: 50px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <!-- Logo Section -->
        <div class="logo-section">
            <div class="logo-icon">🏥</div>
            <div class="hospital-name">Hospital EHMS</div>
            <div class="tagline">Electronic Health Management System</div>
        </div>

        <!-- Messages -->
        <div class="error-message" id="errorMessage"></div>
        <div class="success-message" id="successMessage"></div>

        <!-- Login Form -->
        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="username">Username or Email</label>
                <input 
                    type="text" 
                    id="username" 
                    placeholder="Enter your username" 
                    required
                    value="admin"
                >
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input 
                    type="password" 
                    id="password" 
                    placeholder="Enter your password" 
                    required
                    value="password123"
                >
            </div>

            <div class="remember-forgot">
                <label style="margin: 0;">
                    <input type="checkbox" id="remember"> Remember me
                </label>
                <a href="#" class="forgot-password" onclick="handleForgotPassword(event)">Forgot Password?</a>
            </div>

            <button type="submit" class="login-btn">Sign In</button>
        </form>

        <!-- Demo Credentials -->
        <div class="demo-credentials">
            <strong>Demo Credentials:</strong>
            <p><strong>Username:</strong> admin</p>
            <p><strong>Password:</strong> password123</p>
            <p style="margin-top: 8px; font-style: italic;">Or use any other credentials (demo mode)</p>
        </div>

        <!-- Sign Up Section -->
        <div class="signup-section">
            Don't have an account? <a href="#" onclick="handleSignup(event)">Sign up here</a>
        </div>
    </div>

    <script>
        // Handle Login
        function handleLogin(event) {
            event.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMessage');
            const successMsg = document.getElementById('successMessage');

            // Validate
            if (!username || !password) {
                errorMsg.textContent = '❌ Please fill in all fields';
                errorMsg.style.display = 'block';
                return;
            }

            // Simulate login (in real app, this would call backend)
            errorMsg.style.display = 'none';
            successMsg.textContent = '✅ Login successful! Redirecting...';
            successMsg.style.display = 'block';

            // Save user data to browser
            localStorage.setItem('user', JSON.stringify({
                username: username,
                loginTime: new Date().toLocaleString()
            }));

            // Redirect after 1 second
            setTimeout(() => {
                window.location.href = 'hospital-dashboard.html';
            }, 1000);
        }

        // Handle Forgot Password
        function handleForgotPassword(event) {
            event.preventDefault();
            alert('📧 Password reset link sent to your email!\n\nCheck your inbox for instructions.');
        }

        // Handle Sign Up
        function handleSignup(event) {
            event.preventDefault();
            alert('📝 Sign up feature coming soon!\n\nFor now, use demo credentials:\nUsername: admin\nPassword: password123');
        }

        // Check if user is already logged in
        window.onload = function() {
            const user = localStorage.getItem('user');
            if (user) {
                const userData = JSON.parse(user);
                // Optionally auto-fill username
                document.getElementById('username').value = userData.username;
            }
        };
    </script>
</body>
</html>
